<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern SoundBoard</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="container">

<h1>🎵 SoundBoard</h1>

<p class="subtitle">
Click any sound to play it
</p>

<div class="controls">

<label>

🔊 Volume

<input
type="range"
id="volumeSlider"
min="0"
max="100"
value="70">

</label>

<button id="stopAll">
⏹ Stop All
</button>

</div>

<div id="soundGrid" class="grid">

<button class="sound-btn">⏰ Clock</button>

<button class="sound-btn">⌨️ Keyboard</button>

<button class="sound-btn">💨 Air Whoosh</button>

<button class="sound-btn">🎺 Toy Whistle</button>

<button class="sound-btn">👏 Applause</button>

<button class="sound-btn">🚨 Emergency Alarm</button>

<button class="sound-btn">🎯 Suspense</button>

<button class="sound-btn">⏰ Alarm</button>

<button class="sound-btn">🚀 Rocket</button>

<button class="sound-btn">✨ Sweep</button>

<button class="sound-btn">🎮 Game Over</button>

<button class="sound-btn">🦗 Crickets</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
